  <rect width="100%" height="100%" fill="#006994" /> <g>
    <text font-size="15" x="0" y="50">🐟</text>
    <text font-size="12" x="25" y="45">🐟</text>
    <text font-size="16" x="15" y="65">🐟</text>
    <text font-size="14" x="40" y="60">🐟</text>
    <animateTransform attributeName="transform" type="translate" from="-100 0" to="900 0" begin="1s" dur="18s" repeatCount="indefinite" />
  </g>

  <g>
    <text font-size="40" y="150">🐡</text>
    <animateTransform attributeName="transform" type="translate" from="-100 0" to="900 0" begin="5s" dur="25s" repeatCount="indefinite" />
  </g>

  <g>
    <text font-size="35" y="360">🐙</text>
    <animateTransform attributeName="transform" type="translate" from="-100 0" to="900 0" begin="0s" dur="12s" repeatCount="indefinite" />
  </g>


  <g>
    <g transform="scale(-1, 1)">
      <text font-size="30" y="80">🐟</text>
    </g>
    <animateTransform attributeName="transform" type="translate" from="850 0" to="-100 0" begin="0s" dur="8s" repeatCount="indefinite" />
  </g>

  <g>
    <g transform="scale(-1, 1)">
      <text font-size="20" x="0" y="240">🐠</text>
      <text font-size="20" x="30" y="260">🐠</text>
      <text font-size="15" x="20" y="220">🐠</text>
      <text font-size="25" x="50" y="245">🐠</text>
    </g>
    <animateTransform attributeName="transform" type="translate" from="900 0" to="-100 0" begin="2s" dur="15s" repeatCount="indefinite" />
  </g>

  <g>
    <text font-size="30" x="650">🦑</text>
    <animateTransform attributeName="transform" type="translate" from="0 450" to="0 -50" begin="10s" dur="20s" repeatCount="indefinite" />
  </g>
</svg>
